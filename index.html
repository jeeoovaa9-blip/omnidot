<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniDot</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
/* === RESET & BASE === */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* Hide MuleRun branding */
#mulepage-bar, #mulepage-badge, [id*="mulepage" i], [class*="mulepage" i] {
  display: none !important;
  visibility: hidden !important;
  opacity: 0 !important;
  pointer-events: none !important;
  height: 0 !important;
  max-height: 0 !important;
  width: 0 !important;
  overflow: hidden !important;
  position: absolute !important;
  left: -9999px !important;
}
:root {
  --black: #000000;
  --white: #ffffff;
  --gray-100: #f0f0f0;
  --gray-300: #a0a0a0;
  --gray-500: #666666;
  --gray-700: #333333;
  --gray-800: #1a1a1a;
  --gray-900: #0d0d0d;
  --accent-blue: #4a9eff;
  --accent-gold: #d4a843;
  --font-body: 'Outfit', sans-serif;
  --font-display: 'Syne', sans-serif;
  --transition: cubic-bezier(0.16, 1, 0.3, 1);
  
  /* Fluid sizing based on viewport */
  --fs-xs: clamp(10px, 1.5vw, 12px);
  --fs-sm: clamp(11px, 1.8vw, 13px);
  --fs-base: clamp(13px, 2vw, 14px);
  --fs-md: clamp(14px, 2.2vw, 16px);
  --fs-lg: clamp(24px, 4vw, 36px);
  --fs-xl: clamp(32px, 6vw, 48px);
  
  --spacing-xs: clamp(8px, 2vw, 12px);
  --spacing-sm: clamp(12px, 3vw, 16px);
  --spacing-md: clamp(16px, 4vw, 24px);
  --spacing-lg: clamp(24px, 5vw, 40px);
  --spacing-xl: clamp(32px, 6vw, 48px);
  
  --nav-height: clamp(56px, 8vh, 64px);
  --input-height: clamp(44px, 6vh, 52px);
  --btn-height: clamp(44px, 6vh, 48px);
  
  --radius-sm: clamp(6px, 1vw, 8px);
  --radius-md: clamp(8px, 1.5vw, 12px);
  --radius-lg: clamp(12px, 2vw, 16px);
}
html, body { 
  height: 100%; 
  height: 100dvh; /* Dynamic viewport height for mobile */
  font-family: var(--font-body); 
  background: var(--black); 
  color: var(--white); 
  overflow-x: hidden; 
  overflow-y: auto;
  margin: 0; 
  padding: 0;
  padding-top: env(safe-area-inset-top);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
  padding-bottom: env(safe-area-inset-bottom);
}
html { 
  -webkit-text-size-adjust: 100%; 
  -ms-text-size-adjust: 100%; 
  scroll-behavior: smooth;
}
a { color: var(--white); text-decoration: none; }
button { font-family: var(--font-body); cursor: pointer; border: none; background: none; color: var(--white); }
input { font-family: var(--font-body); }

/* === SCREEN MANAGEMENT === */
.screen { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
.screen.active { display: flex; }

/* === LOGIN SCREEN === */
#login-screen {
  flex-direction: column; align-items: center; justify-content: center;
  background: var(--black); position: relative; z-index: 1;
  width: 100%; max-width: 100vw; overflow-x: hidden;
}
#login-screen::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at 50% 30%, rgba(74,158,255,0.03) 0%, transparent 70%);
  pointer-events: none;
}
.login-logo { margin-bottom: var(--spacing-xl); animation: fadeSlideUp 0.8s var(--transition) both; }
.login-logo svg { width: clamp(80px, 15vw, 120px); height: clamp(80px, 15vw, 120px); }
.login-form { width: 100%; max-width: min(380px, 90vw); padding: 0 var(--spacing-md); }
.login-field { margin-bottom: var(--spacing-lg); animation: fadeSlideUp 0.8s var(--transition) both; }
.login-field:nth-child(1) { animation-delay: 0.1s; }
.login-field:nth-child(2) { animation-delay: 0.2s; }
.login-label {
  display: block; font-size: var(--fs-xs); font-weight: 600; letter-spacing: 2.5px;
  text-transform: uppercase; color: var(--gray-300); margin-bottom: var(--spacing-xs);
}
.login-input-wrap {
  display: flex; align-items: center; border: 1px solid var(--gray-700);
  border-radius: var(--radius-sm); padding: 0 var(--spacing-sm); height: var(--input-height);
  background: rgba(255,255,255,0.03); transition: border-color 0.3s ease, box-shadow 0.3s ease;
}
.login-input-wrap:focus-within {
  border-color: var(--accent-blue);
  box-shadow: 0 0 0 3px rgba(74,158,255,0.08);
}
.login-input-wrap input {
  flex: 1; background: none; border: none; outline: none;
  color: var(--white); font-size: var(--fs-base); font-weight: 300; letter-spacing: 0.3px;
}
.login-input-wrap input::placeholder { color: var(--gray-500); }
.input-icon {
  width: clamp(16px, 2.5vw, 20px); height: clamp(16px, 2.5vw, 20px); margin-left: var(--spacing-xs); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; opacity: 0.5;
  transition: opacity 0.3s ease;
}
.input-icon:hover { opacity: 0.9; }
.input-icon svg { width: 100%; height: 100%; }
.eye-toggle { cursor: pointer; }
.forgot-link {
  display: inline-block; font-size: var(--fs-sm); color: var(--gray-500);
  margin-bottom: var(--spacing-lg); transition: color 0.2s ease; letter-spacing: 0.3px;
  animation: fadeSlideUp 0.8s var(--transition) both; animation-delay: 0.3s;
}
.forgot-link:hover { color: var(--accent-blue); }
.login-btn {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: var(--btn-height); border: 1px solid var(--white); border-radius: var(--radius-sm);
  font-size: var(--fs-sm); font-weight: 600; letter-spacing: 4px; text-transform: uppercase;
  background: transparent; color: var(--white); transition: all 0.3s ease;
  animation: fadeSlideUp 0.8s var(--transition) both; animation-delay: 0.4s;
}
.login-btn:hover {
  background: var(--white); color: var(--black);
  box-shadow: 0 0 30px rgba(255,255,255,0.1);
}
.login-btn:active { transform: scale(0.98); }
.login-footer {
  margin-top: var(--spacing-xl); font-size: var(--fs-base); color: var(--gray-500);
  animation: fadeSlideUp 0.8s var(--transition) both; animation-delay: 0.5s;
}
.login-footer a { color: var(--white); font-weight: 500; transition: color 0.2s; }
.login-footer a:hover { color: var(--accent-blue); }
.login-error {
  display: none; background: rgba(255,60,60,0.1); border: 1px solid rgba(255,60,60,0.3);
  border-radius: var(--radius-sm); padding: var(--spacing-xs) var(--spacing-sm); margin-bottom: var(--spacing-md);
  font-size: var(--fs-sm); color: #ff6b6b; text-align: center;
}
.login-error.show { display: block; animation: shake 0.4s ease; }

/* === MAIN PAGE === */
#main-screen {
  flex-direction: column; background: var(--black); position: relative;
  width: 100%; max-width: 100vw; overflow-x: hidden;
}
.app-shell {
  display: flex; min-height: 100vh;
}
.menu-button {
  position: fixed; top: max(12px, env(safe-area-inset-top, 12px)); left: max(12px, env(safe-area-inset-left, 12px)); z-index: 350;
  display: inline-flex; align-items: center; justify-content: center;
  min-width: clamp(60px, 12vw, 76px); height: clamp(40px, 6vh, 48px); padding: 0 clamp(12px, 2vw, 16px);
  font-size: var(--fs-sm); font-weight: 700; color: var(--white);
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.14);
  border-radius: 999px; cursor: pointer; transition: all 0.2s ease;
}
.menu-button:hover {
  background: rgba(255,255,255,0.12);
}
.side-menu {
  position: fixed; top: 0; left: 0; bottom: 0; width: clamp(220px, 22vw, 280px);
  padding: var(--spacing-lg) var(--spacing-sm); background: var(--black);
  border-right: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column;
  gap: var(--spacing-md); transition: transform 0.3s var(--transition), opacity 0.3s var(--transition);
  transform: translateX(-100%); opacity: 0; pointer-events: none;
  z-index: 300;
}
.side-menu.open {
  transform: translateX(0);
  opacity: 1;
  pointer-events: auto;
}
.side-menu.collapsed {
  width: 72px;
  background: var(--black);
  border-right: none;
}
.side-menu.collapsed .menu-section,
.side-menu.collapsed .menu-links {
  display: none;
}
.side-menu.collapsed .menu-header {
  justify-content: center;
}
.side-menu.collapsed .menu-toggle {
  display: none;
}
.menu-header {
  display: flex; align-items: center; justify-content: space-between; gap: var(--spacing-sm);
  color: var(--white); font-size: var(--fs-sm); font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; cursor: pointer; width: 100%;
}
.menu-toggle {
  font-size: var(--fs-xs); color: var(--gray-400); padding: 6px 12px;
  border-radius: 999px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
}
.menu-section {
  display: flex; flex-direction: column; gap: clamp(8px, 1.5vw, 12px);
}
.menu-section-title {
  font-size: var(--fs-xs); font-weight: 600; color: var(--gray-500);
  text-transform: uppercase; letter-spacing: 1px;
}
.menu-links {
  display: flex; flex-direction: column; gap: clamp(8px, 1.5vw, 12px); margin-top: auto;
}
.menu-item {
  display: flex; align-items: center; justify-content: flex-start; width: 100%;
  padding: clamp(10px, 1.5vw, 12px) clamp(12px, 2vw, 16px); font-size: var(--fs-sm); font-weight: 500; color: var(--gray-100);
  border-radius: var(--radius-sm); background: rgba(255,255,255,0.02); border: 1px solid transparent;
  text-align: left; transition: all 0.2s ease;
}
.menu-item.active,
.menu-item:hover {
  color: var(--white); background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.12);
}
.content-area {
  margin-left: 0; flex: 1; min-height: 100vh;
  padding: calc(var(--nav-height) + var(--spacing-lg)) var(--spacing-md) var(--spacing-lg);
}
.content-area .main-content {
  align-items: center;
  max-width: 860px;
  width: 100%;
}
.content-area .main-title { text-align: center; }
.route-panel {
  width: 100%; max-width: 860px; margin-top: var(--spacing-lg);
  padding: var(--spacing-md); border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-md); background: rgba(255,255,255,0.02);
}
.route-title {
  font-size: var(--fs-lg); font-weight: 800; margin-bottom: var(--spacing-sm);
}
.route-description {
  font-size: var(--fs-base); color: var(--gray-300); line-height: 1.8;
}
@media (max-width: 900px) {
  .app-shell { flex-direction: column; }
  .side-menu {
    position: relative; width: 100%; border-right: none; border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .side-menu.collapsed { width: 100%; }
  .content-area { margin-left: 0; padding-top: calc(var(--nav-height) + var(--spacing-md)); }
}
.main-content {
  flex: 1; display: flex; flex-direction: column; align-items: center;
  justify-content: flex-start; padding-top: calc(var(--nav-height) + clamp(16px, 4vh, 36px)); position: relative;
  width: 100%; max-width: min(1200px, 95vw); margin: 0 auto;
  padding-left: var(--spacing-md); padding-right: var(--spacing-md);
}
.main-title {
  font-family: var(--font-display); font-size: clamp(34px, 5.5vw, 72px); font-weight: 800;
  letter-spacing: -0.03em; line-height: 1.05; margin-bottom: calc(var(--spacing-md) * 1.2); opacity: 0;
  animation: fadeSlideUp 0.8s var(--transition) 0.2s forwards;
  text-align: center; max-width: min(720px, 100%); width: 100%;
}
.search-container {
  display: flex; align-items: center; gap: var(--spacing-xs); width: 100%; max-width: min(640px, 90vw);
  opacity: 0; animation: fadeSlideUp 0.8s var(--transition) 0.4s forwards;
}
.search-bar {
  flex: 1; display: flex; align-items: center; border: 1px solid var(--gray-700);
  border-radius: var(--radius-md); padding: 0 var(--spacing-sm); height: var(--input-height);
  background: rgba(255,255,255,0.03); transition: all 0.3s ease;
}
.search-bar:focus-within {
  border-color: rgba(74,158,255,0.5);
  box-shadow: 0 0 0 3px rgba(74,158,255,0.06), 0 8px 32px rgba(0,0,0,0.3);
}
.search-bar textarea {
  flex: 1; background: none; border: none; outline: none; resize: none;
  overflow: hidden;
  color: var(--white); font-size: var(--fs-base); font-weight: 300; line-height: 1.5;
  height: 100%; padding: 14px 0; font-family: var(--font-body);
}
.search-bar textarea::placeholder { color: var(--gray-500); }
.search-actions { display: flex; align-items: stretch; gap: 0; flex-shrink: 0; margin-left: var(--spacing-xs); }
.search-actions button {
  min-width: clamp(32px, 4vw, 36px); height: 100%; display: flex;
  align-items: center; justify-content: center; transition: all 0.2s ease;
  border: 1px solid var(--gray-700);
  background: rgba(255,255,255,0.05);
  box-sizing: border-box;
}
#mic-btn {
  border-right: none;
  border-radius: var(--radius-sm) 0 0 var(--radius-sm);
}
#send-btn {
  margin-left: -1px;
  border-left: none !important;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0 !important;
}
.search-actions button:hover { background: rgba(255,255,255,0.08); }
.search-actions button svg { width: clamp(16px, 2vw, 18px); height: clamp(16px, 2vw, 18px); opacity: 0.6; }
.search-actions button:hover svg { opacity: 1; }
.send-btn {
  width: auto !important; padding: 0 clamp(10px, 2vw, 16px) !important; gap: 6px;
  font-size: var(--fs-xs) !important; font-weight: 500; letter-spacing: 1px;
  border: 1px solid var(--gray-700) !important;
  border-left: none !important;
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0 !important;
  background: rgba(255,255,255,0.05) !important;
}
.send-btn:hover { border-color: var(--white) !important; }
/* Chat toggle button hidden - panel opens automatically on search */
.chat-toggle-btn { display: none; }
.main-logo {
  margin-top: clamp(24px, 5vh, 40px); opacity: 0; animation: fadeSlideUp 0.8s var(--transition) 0.6s forwards;
}
.main-logo svg { width: clamp(100px, 15vw, 140px); height: clamp(100px, 15vw, 140px); opacity: 0.15; }
.ai-response-area {
  position: fixed; top: calc(var(--nav-height) + max(16px, env(safe-area-inset-top, 16px))); right: max(16px, env(safe-area-inset-right, 16px)); left: auto;
  width: clamp(280px, 32vw, 360px); max-width: calc(100vw - max(32px, env(safe-area-inset-left, 16px) + env(safe-area-inset-right, 16px)));
  max-height: calc(100vh - calc(var(--nav-height) + max(32px, env(safe-area-inset-top, 16px) + env(safe-area-inset-bottom, 16px))));
  display: none; animation: fadeSlideUp 0.5s var(--transition);
  z-index: 340; overflow: hidden;
}
.ai-response-area.show { display: block; }
.chat-container {
  width: 100%; height: 100%; display: flex; flex-direction: column;
  background: #090909; border: 1px solid rgba(255,255,255,0.08);
  border-radius: var(--radius-md); padding: var(--spacing-lg); box-shadow: 0 20px 60px rgba(0,0,0,0.35);
}
.chat-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: var(--spacing-md); color: var(--white); font-size: var(--fs-sm);
  opacity: 0.85;
}
.chat-header span:last-child {
  color: var(--accent-blue);
  font-weight: 600;
}
.chat-close {
  background: transparent; border: none; color: var(--gray-300);
  font-size: 18px; cursor: pointer; line-height: 1;
  padding: 4px 6px; border-radius: 999px; transition: all 0.2s ease;
}
.chat-close:hover {
  color: var(--white); background: rgba(255,255,255,0.08);
}
@media (max-width: 820px) {
  .ai-response-area {
    top: calc(var(--nav-height) + var(--spacing-sm));
    left: max(8px, env(safe-area-inset-left, 8px));
    right: max(8px, env(safe-area-inset-right, 8px));
    width: auto;
    max-width: none;
    min-width: auto;
  }
}
.chat-bubble {
  background: #050505; padding: var(--spacing-md); border-radius: var(--radius-lg);
  border: 1px solid rgba(255,255,255,0.06); min-height: 150px; color: var(--gray-100);
}
.chat-message {
  white-space: pre-wrap; line-height: 1.8; font-size: var(--fs-base);
  color: var(--gray-100); font-weight: 300;
}
.ai-sources {
  margin-top: var(--spacing-md); display: flex; flex-wrap: wrap; gap: clamp(4px, 1vw, 8px);
}
.ai-source-link {
  font-size: var(--fs-xs); padding: clamp(3px, 0.5vw, 4px) clamp(8px, 1.5vw, 10px); border: 1px solid var(--gray-700);
  border-radius: 20px; color: var(--accent-blue); transition: all 0.2s ease;
}
.ai-source-link:hover { border-color: var(--accent-blue); background: rgba(74,158,255,0.08); }
.ai-response-text .cursor-blink {
  display: inline-block; width: 2px; height: 16px; background: var(--accent-blue);
  margin-left: 2px; animation: blink 0.8s step-end infinite; vertical-align: text-bottom;
}

/* === SIDE PANEL (Compact Info Card) === */
#side-panel {
  display: none !important;
}
#side-panel.open { transform: translateX(0); }
.panel-header {
  padding: var(--spacing-sm) var(--spacing-md); border-bottom: 1px solid rgba(255,255,255,0.06);
  display: flex; align-items: center; justify-content: space-between;
}
.panel-title {
  font-family: var(--font-display); font-size: var(--fs-sm); font-weight: 600;
  letter-spacing: 1px; text-transform: uppercase; color: var(--gray-300);
}
.panel-close {
  width: clamp(24px, 3vw, 28px); height: clamp(24px, 3vw, 28px); border-radius: var(--radius-sm); display: flex;
  align-items: center; justify-content: center; transition: background 0.2s;
}
.panel-close:hover { background: rgba(255,255,255,0.08); }
.panel-close svg { width: clamp(12px, 1.5vw, 14px); height: clamp(12px, 1.5vw, 14px); opacity: 0.6; }
.panel-tabs { display: none; }
.panel-body { flex: 1; overflow-y: auto; padding: var(--spacing-sm) var(--spacing-md); max-height: 50vh; }
.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-track { background: transparent; }
.panel-body::-webkit-scrollbar-thumb { background: var(--gray-700); border-radius: 4px; }
.tab-content { display: none; }
.tab-content.active { display: block; }
#tab-chat { display: none !important; }
.result-item {
  padding: var(--spacing-sm) 0; border-bottom: 1px solid rgba(255,255,255,0.04);
}
.result-item-title {
  font-size: var(--fs-sm); font-weight: 500; color: var(--white); margin-bottom: 4px;
}
.result-item-snippet {
  font-size: var(--fs-xs); color: var(--gray-500); line-height: 1.6; margin-bottom: 4px;
}
.result-item-url {
  font-size: var(--fs-xs); color: var(--accent-blue); word-break: break-all;
}
.panel-input-area { display: none; }
.panel-overlay { display: none; }

/* === ANIMATIONS === */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}
@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.3); opacity: 0.7; }
}
@keyframes orbitSpin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* === RESPONSIVE === */
/* === RESPONSIVE (Fluid adjustments only) === */
/* Extra small screens - minimal adjustments */
@media (max-width: 360px) {
  .nav-left, .nav-right { gap: 8px; }
  .nav-link { letter-spacing: 0.3px; }
  .search-actions { gap: 2px; }
}

/* Landscape orientation on small devices */
@media (max-height: 500px) and (orientation: landscape) {
  .main-content { padding-top: calc(var(--nav-height) + var(--spacing-xs)); }
  .main-title { margin-bottom: var(--spacing-sm); }
  .main-logo { margin-top: var(--spacing-sm); }
  .main-logo svg { width: clamp(60px, 12vh, 100px); height: clamp(60px, 12vh, 100px); }
}

/* Very tall screens (ultrawide monitors) */
@media (min-aspect-ratio: 21/9) {
  .search-container { max-width: min(720px, 70vw); }
  #side-panel { width: clamp(300px, 25vw, 400px); }
}

/* === MOBILE RESPONSIVE (max-width: 768px) === */
@media (max-width: 768px) {
  /* Menu button - bigger and more accessible */
  .menu-button {
    top: max(10px, env(safe-area-inset-top, 10px));
    left: max(10px, env(safe-area-inset-left, 10px));
    min-width: clamp(56px, 14vw, 64px);
    height: clamp(38px, 5.5vh, 44px);
    padding: 0 clamp(10px, 2.5vw, 14px);
    font-size: var(--fs-xs);
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
  }

  /* Side menu - full screen overlay on mobile */
  .side-menu {
    width: clamp(260px, 75vw, 300px);
    max-width: 85vw;

<script>
(function() {
  'use strict';

  // === DOM REFS ===
  const loginScreen = document.getElementById('login-screen');
  const mainScreen = document.getElementById('main-screen');
  const loginForm = document.getElementById('login-form');
  const loginEmail = document.getElementById('login-email');
  const loginError = document.getElementById('login-error');
  const signupLink = document.getElementById('signup-link');
  const searchInput = document.getElementById('search-input');
  const sendBtn = document.getElementById('send-btn');
  const resultList = document.getElementById('result-list');
  const aiResponseArea = document.getElementById('ai-response-area');
  const aiResponseText = document.getElementById('ai-response-text');
  const aiSources = document.getElementById('ai-sources');
  const micBtn = document.getElementById('mic-btn');
  const sideMenu = document.getElementById('side-menu');
  const menuButton = document.getElementById('menu-button');
  const menuHeader = document.getElementById('menu-header');
  const menuToggle = document.getElementById('menu-toggle');
  const menuOverlay = document.getElementById('menu-overlay');
  const menuItems = document.querySelectorAll('.menu-item');
  const routeTitle = document.getElementById('route-title');
  const routeDescription = document.getElementById('route-description');
  const mainLogo = document.querySelector('.main-logo');
  const chatClose = document.getElementById('chat-close');

  // === STATE ===
  let isAuthenticated = true;

  // === SANITIZE ===
  function sanitize(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // === EMAIL VALIDATION ===
  function isValidEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  }

  // === SCREEN SWITCHING ===
  function showScreen(screen) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    screen.classList.add('active');
  }

  function setRoute(route) {
    menuItems.forEach(item => item.classList.toggle('active', item.dataset.route === route));
    let title = 'Painel';
    let description = 'Utilize o menu para acessar recursos e envie sua solicitação para receber uma resposta objetiva.';

    switch (route) {
      case 'active':
        title = 'Tarefas Ativas';
        description = 'Visualize as tarefas em andamento e acompanhe o status de execução.';
        break;
      case 'completed':
        title = 'Tarefas Concluídas';
        description = 'Consulte o histórico de entregas finalizadas e seus resultados.';
        break;
      case 'projects':
        title = 'Projetos';
        description = 'Gerencie seus projetos e mantenha-se alinhado ao progresso de cada etapa.';
        break;
      case 'account':
        title = 'Conta';
        description = 'Atualize seu perfil e suas informações de acesso com segurança.';
        break;
      case 'notifications':
        title = 'Notificações';
        description = 'Configure alertas e acompanhe avisos importantes do sistema.';
        break;
      case 'security':
        title = 'Segurança';
        description = 'Gerencie credenciais e políticas de proteção de dados.';
        break;
      case 'information':
        title = 'Informações';
        description = 'Acesse detalhes sobre recursos, funcionamento e benefícios do OmniDot.';
        break;
      case 'support':
        title = 'Suporte';
        description = 'Entre em contato para assistência técnica e esclarecimento de dúvidas.';
        break;
      case 'budget':
        title = 'Orçamento';
        description = 'Avalie planos e custos para uso profissional do OmniDot.';
        break;
      default:
        title = 'Painel';
        description = 'Utilize o menu para acessar recursos e envie sua solicitação para receber uma resposta objetiva.';
    }

    routeTitle.textContent = title;
    routeDescription.textContent = description;
    aiResponseArea.classList.remove('show');
    if (mainLogo) {
      mainLogo.style.display = '';
    }
  }

  function navigateTo(route) {
    setRoute(route);
  }

  function toggleMenu() {
    if (!sideMenu) return;
    sideMenu.classList.toggle('open');
    menuToggle.textContent = sideMenu.classList.contains('open') ? 'Ocultar' : 'Exibir';
    
    // Mobile: toggle overlay and body scroll
    if (window.innerWidth <= 768) {
      if (menuOverlay) {
        menuOverlay.classList.toggle('show', sideMenu.classList.contains('open'));
      }
      document.body.classList.toggle('menu-open', sideMenu.classList.contains('open'));
    }
  }

  function closeMenu() {
    if (!sideMenu) return;
    sideMenu.classList.remove('open');
    menuToggle.textContent = 'Exibir';
    
    // Mobile: hide overlay and restore scroll
    if (menuOverlay) {
      menuOverlay.classList.remove('show');
    }
    document.body.classList.remove('menu-open');
  }


  if (menuButton) {
    menuButton.addEventListener('click', function() {
      toggleMenu();
    });
  }

  if (menuHeader) {
    menuHeader.addEventListener('click', function() {
      toggleMenu();
    });
  }

  // Close menu when clicking overlay (mobile)
  if (menuOverlay) {
    menuOverlay.addEventListener('click', function() {
      closeMenu();
    });
  }

  // Close menu on window resize to desktop
  window.addEventListener('resize', function() {
    if (window.innerWidth > 768) {
      closeMenu();
    }
  });

  menuItems.forEach(function(item) {
    item.addEventListener('click', function() {
      navigateTo(this.dataset.route);
    });
  });

  navigateTo('home');


  // === NAV LINKS ===
  document.querySelectorAll('.nav-link').forEach(function(link) {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
      this.classList.add('active');
    });
  });

  // === SEARCH / AI PIPELINE ===
  function autoResizeTextarea() {
    searchInput.style.height = 'auto';
    searchInput.style.height = Math.min(searchInput.scrollHeight, 120) + 'px';
  }
  searchInput.addEventListener('input', autoResizeTextarea);

  function handleSearch() {
    const query = searchInput.value.trim();
    if (!query) return;

    const sanitized = sanitize(query);
    searchInput.value = '';
    autoResizeTextarea();
    routeTitle.textContent = 'Busca inteligente';
    routeDescription.textContent = 'Aguarde enquanto a IA gera a resposta mais relevante com base em dados recentes.';
    if (mainLogo) {
      mainLogo.style.display = 'none';
    }
    aiResponseArea.classList.add('show');

    updateResultPanel(sanitized);
  }

  sendBtn.addEventListener('click', handleSearch);
  searchInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      handleSearch();
    }
  });

  if (chatClose) {
    chatClose.addEventListener('click', function() {
      aiResponseArea.classList.remove('show');
      if (mainLogo) {
        mainLogo.style.display = '';
      }
    });
  }

  async function updateResultPanel(query) {
    let responseText = '';
    let sourceHtml = '';
    aiResponseArea.classList.add('show');
    let html = '<div class="result-item">';
    html += '<div class="result-item-snippet" style="color:var(--gray-500);font-style:italic">Gerando resposta otimizada com IA...</div>';
    html += '</div>';
    resultList.innerHTML = html;
    renderAIResponse('Gerando resposta otimizada com IA...', '');
    
    try {
      // Buscar contexto da Wikipedia
      const searchUrl = 'https://pt.wikipedia.org/w/api.php?action=query&list=search&srsearch=' + 
                        encodeURIComponent(query) + '&format=json&origin=*&srlimit=1';
      const searchRes = await fetch(searchUrl);
      const searchData = await searchRes.json();
      
      let context = '';
      let title = query;
      
      if (searchData.query && searchData.query.search && searchData.query.search.length > 0) {
        title = searchData.query.search[0].title;
        
        const extractUrl = 'https://pt.wikipedia.org/w/api.php?action=query&titles=' + 
                          encodeURIComponent(title) + '&prop=extracts&exintro=true&explaintext=true&format=json&origin=*';
        const extractRes = await fetch(extractUrl);
        const extractData = await extractRes.json();
        
        const pages = extractData.query.pages;
        const pageId = Object.keys(pages)[0];
        context = pages[pageId].extract || '';
      }
      
      // Usar API gratuita do Google Gemini
      const GEMINI_API_KEY = 'AIzaSyDemoKeyForTesting123456789'; // Chave de demonstração
      const geminiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`;
      
      const prompt = `Atue como um especialista em SEO e criador de conteúdo sênior, focado nas diretrizes E-E-A-T do Google.

Tema: ${query}

Contexto base: ${context.substring(0, 1000)}

Gere uma resposta otimizada seguindo esta estrutura:

1. RESPOSTA DIRETA (2-3 parágrafos curtos): Responda imediatamente à pergunta principal
2. CONTEXTO E ESPECIALIDADE: Explique com autoridade, citando dados ou fatos consolidados
3. INFORMAÇÕES COMPLEMENTARES: Detalhes relevantes organizados em tópicos quando aplicável

Regras:
- Tom de autoridade e especialidade
- Resposta direta sem enrolação
- Use linguagem clara e objetiva
- Inclua informações verificáveis
- Formate com parágrafos curtos e escaneáveis
- Máximo 400 palavras

Gere apenas o conteúdo, sem explicações sobre o processo.`;
      
      const geminiResponse = await fetch(geminiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: {
            temperature: 0.7,
            maxOutputTokens: 800
          }
        })
      });
      
      if (geminiResponse.ok) {
        const geminiData = await geminiResponse.json();
        const aiResponse = geminiData.candidates[0].content.parts[0].text;
        responseText = aiResponse;
        sourceHtml = '<a class="ai-source-link" href="https://pt.wikipedia.org/wiki/' + encodeURIComponent(title) + '" target="_blank" rel="noopener">Wikipedia: ' + sanitize(title) + '</a>';
        
        // Formatar resposta da IA
        html = '<div class="result-item">';
        html += '<div class="result-item-title" style="font-size:var(--fs-md);margin-bottom:16px;font-weight:700">' + sanitize(title) + '</div>';
        
        // Processar texto da IA (converter quebras de linha em parágrafos)
        const formattedText = aiResponse
          .split('\n\n')
          .map(p => p.trim())
          .filter(p => p.length > 0)
          .map(p => '<p style="margin-bottom:16px;line-height:1.8">' + sanitize(p) + '</p>')
          .join('');
        
        html += '<div class="result-item-snippet" style="font-size:var(--fs-base);color:var(--gray-100)">' + formattedText + '</div>';
        
        // Fonte
        html += '<div style="margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.06);font-size:var(--fs-xs);color:var(--gray-500)">';
        html += '<span style="color:var(--accent-blue)">✓</span> Resposta gerada por IA com base em fontes verificadas';
        html += '</div>';
        
        html += '</div>';
        
      } else {
        // Fallback: usar conteúdo da Wikipedia formatado
        if (context) {
          html = formatSEOContent(query, title, context);
          responseText = context.substring(0, 1200) + (context.length > 1200 ? '...' : '');
          sourceHtml = '<a class="ai-source-link" href="https://pt.wikipedia.org/wiki/' + encodeURIComponent(title) + '" target="_blank" rel="noopener">Wikipedia: ' + sanitize(title) + '</a>';
        } else {
          html = '<div class="result-item">';
          html += '<div class="result-item-snippet">Não foram encontrados resultados para "' + sanitize(query) + '".</div>';
          html += '</div>';
          responseText = 'Não foram encontrados resultados para "' + sanitize(query) + '".';
          sourceHtml = '';
        }
      }
      
    } catch (error) {
      // Fallback em caso de erro
      try {
        const searchUrl = 'https://pt.wikipedia.org/w/api.php?action=query&list=search&srsearch=' + 
                          encodeURIComponent(query) + '&format=json&origin=*&srlimit=1';
        const searchRes = await fetch(searchUrl);
        const searchData = await searchRes.json();
        
        if (searchData.query && searchData.query.search && searchData.query.search.length > 0) {
          const title = searchData.query.search[0].title;
          const extractUrl = 'https://pt.wikipedia.org/w/api.php?action=query&titles=' + 
                            encodeURIComponent(title) + '&prop=extracts&exintro=true&explaintext=true&format=json&origin=*';
          const extractRes = await fetch(extractUrl);
          const extractData = await extractRes.json();
          const pages = extractData.query.pages;
          const pageId = Object.keys(pages)[0];
          const context = pages[pageId].extract || '';
          
          if (context) {
            html = formatSEOContent(query, title, context);
            responseText = context.substring(0, 1200) + (context.length > 1200 ? '...' : '');
            sourceHtml = '<a class="ai-source-link" href="https://pt.wikipedia.org/wiki/' + encodeURIComponent(title) + '" target="_blank" rel="noopener">Wikipedia: ' + sanitize(title) + '</a>';
          } else {
            html = '<div class="result-item">';
            html += '<div class="result-item-snippet">Erro ao gerar resposta. Tente novamente.</div>';
            html += '</div>';
            responseText = 'Erro ao gerar resposta. Tente novamente.';
            sourceHtml = '';
          }
        } else {
          html = '<div class="result-item">';
          html += '<div class="result-item-snippet">Não foram encontrados resultados para "' + sanitize(query) + '".</div>';
          html += '</div>';
          responseText = 'Não foram encontrados resultados para "' + sanitize(query) + '".';
          sourceHtml = '';
        }
      } catch (e) {
        html = '<div class="result-item">';
        html += '<div class="result-item-snippet">Erro ao buscar informações. Verifique sua conexão.</div>';
        html += '</div>';
        responseText = 'Erro ao buscar informações. Verifique sua conexão.';
        sourceHtml = '';
      }
    }
    
    resultList.innerHTML = html;
    renderAIResponse(responseText, sourceHtml);
  }

  function getQuickAnswer(text) {
    if (!text) return '';
    const trimmed = text.trim().replace(/\s+/g, ' ');
    const sentences = trimmed.split(/(?<=[.!?])\s+/);
    const answer = sentences.slice(0, 2).join(' ');
    return answer.length > 240 ? answer.slice(0, 240).trim() + '...' : answer;
  }

  function renderAIResponse(text, sourceHtml) {
    if (!aiResponseArea) return;
    const quick = getQuickAnswer(text);
    aiResponseText.textContent = quick;
    aiSources.innerHTML = sourceHtml || '';
  }

  function typeWriterEffect(text, element, index, callback) {
    if (!text) {
      element.textContent = '';
      if (callback) callback();
      return;
    }
    if (index < text.length) {
      element.textContent += text.charAt(index);
      setTimeout(function() {
        typeWriterEffect(text, element, index + 1, callback);
      }, 18);
    } else if (callback) {
      callback();
    }
  }
  
  // Função para formatar conteúdo no estilo SEO/E-E-A-T
  function formatSEOContent(query, title, content) {
    const paragraphs = content.split('\n\n').filter(p => p.trim().length > 0);
    const q = query.toLowerCase();
    
    let html = '';
    
    // Título principal
    html += '<div class="result-item">';
    html += '<div class="result-item-title" style="font-size:var(--fs-md);margin-bottom:16px;font-weight:700">' + sanitize(title) + '</div>';
    
    // Resposta direta (primeiros 2-3 parágrafos) - intenção de busca
    const directAnswer = paragraphs.slice(0, 3).join('\n\n');
    html += '<div class="result-item-snippet" style="font-size:var(--fs-base);line-height:1.9;color:var(--gray-100);margin-bottom:20px">' + sanitize(directAnswer) + '</div>';
    
    // Se há mais conteúdo, adicionar seções estruturadas
    if (paragraphs.length > 3) {
      html += '<div style="margin-top:24px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.08)">';
      
      // Adicionar subtítulo para conteúdo complementar
      html += '<div style="font-size:var(--fs-sm);font-weight:600;color:var(--gray-300);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px">Contexto e Detalhes</div>';
      
      // Conteúdo adicional estruturado
      const additionalContent = paragraphs.slice(3, 8).join('\n\n');
      if (additionalContent.length > 100) {
        html += '<div class="result-item-snippet" style="font-size:var(--fs-base);line-height:1.9;color:var(--gray-300)">' + sanitize(additionalContent) + '</div>';
      }
      
      html += '</div>';
    }
    
    // Fonte e credibilidade
    html += '<div style="margin-top:20px;padding-top:16px;border-top:1px solid rgba(255,255,255,0.06);font-size:var(--fs-xs);color:var(--gray-500)">';
    html += '<span style="color:var(--accent-blue)">✓</span> Informações verificadas | Fonte: Wikipedia - Enciclopédia Livre';
    html += '</div>';
    
    html += '</div>';
    
    return html;
  }

  // === MIC BUTTON (placeholder) ===
  micBtn.addEventListener('click', function() {
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      const recognition = new SpeechRecognition();
      recognition.lang = 'pt-BR';
      recognition.interimResults = false;
      recognition.onresult = function(event) {
        searchInput.value = event.results[0][0].transcript;
        autoResizeTextarea();
      };
      recognition.start();
      micBtn.style.opacity = '1';
      recognition.onend = function() { micBtn.style.opacity = ''; };
    }
  });

  // === INIT ===
  // Show main screen directly (public access)
  showScreen(mainScreen);
  setRoute('home');

})();
</script>
